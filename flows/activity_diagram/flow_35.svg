    <line x1="300" y1="92" x2="300" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
        <line x1="300" y1="170" x2="300" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
        <line x1="300" y1="260" x2="300" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
        <line x1="300" y1="350" x2="300" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
        <line x1="300" y1="440" x2="300" y2="471" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
      
    <!-- Start Node -->
    <circle cx="300" cy="80" r="12" fill="#38bdf8"/>
