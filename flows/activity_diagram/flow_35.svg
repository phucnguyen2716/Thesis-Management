        <text x="38" y="16" fill="#34d399" font-size="7.5" font-family="Inter, sans-serif" font-weight="900" style="text-transform: uppercase; letter-spacing: 0.5px;">PostgreSQL DB</text>
        
        <!-- Action Text -->
        <text x="38" y="34" fill="#ffffff" font-size="10.5" font-family="Inter, sans-serif" font-weight="700">Tạo record trong bảng ThesisComments</text>
