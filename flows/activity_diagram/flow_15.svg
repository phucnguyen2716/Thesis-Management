
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
      <defs>
        <!-- Marker for control flow arrowheads -->
        <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748b"/>
        </marker>
      </defs>
      
      <style>
        .title { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; fill: #ffffff; letter-spacing: 0.5px; }
      </style>
      
      <!-- Premium Canvas Background -->
      <rect width="100%" height="100%" fill="#0f172a" rx="16"/>
      
      <!-- Top Swimlane/Process Title Block -->
      <rect width="100%" height="50" fill="#1e293b" rx="16"/>
      <text x="25" y="30" class="title">LUỒNG 15: QUÉT TÌM TÀI LIỆU MỚI TỪ GOOGLE DRIVE</text>
      
      <!-- Flow Category Tag -->
      <rect x="445" y="13" width="130" height="24" rx="12" fill="#38bdf8" opacity="0.15"/>
      <text x="510" y="28" fill="#38bdf8" font-size="8.5" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">ACTIVITY FLOW</text>
      
      
    <line x1="300" y1="92" x2="300" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
        <line x1="300" y1="170" x2="300" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
        <line x1="300" y1="260" x2="300" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
        <line x1="300" y1="350" x2="300" y2="381" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      
      
    <!-- Start Node -->
    <circle cx="300" cy="80" r="12" fill="#38bdf8"/>
    <text x="300" y="60" fill="#38bdf8" font-size="8" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">START</text>
  
      <g transform="translate(140, 120)">
        <!-- Action Glow Shadow -->
        <rect width="320" height="50" rx="12" ry="12" fill="#1e293b" stroke="#fda4af" stroke-width="2" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));"/>
        
        <!-- Step Number badge -->
        <circle cx="18" cy="25" r="9" fill="#fda4af" opacity="0.2"/>
        <circle cx="18" cy="25" r="7" fill="#fda4af"/>
        <text x="18" y="28" fill="#0f172a" font-size="8" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle">1</text>
        
        <!-- Actor name indicator -->
        <text x="38" y="16" fill="#fda4af" font-size="7.5" font-family="Inter, sans-serif" font-weight="900" style="text-transform: uppercase; letter-spacing: 0.5px;">Hangfire Scheduler</text>
        
        <!-- Action Text -->
        <text x="38" y="34" fill="#ffffff" font-size="10.5" font-family="Inter, sans-serif" font-weight="700">Chạy tác vụ định kỳ (Cron Job)</text>
      </g>
    
      <g transform="translate(140, 210)">
        <!-- Action Glow Shadow -->
        <rect width="320" height="50" rx="12" ry="12" fill="#1e293b" stroke="#fb7185" stroke-width="2" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));"/>
        
        <!-- Step Number badge -->
        <circle cx="18" cy="25" r="9" fill="#fb7185" opacity="0.2"/>
        <circle cx="18" cy="25" r="7" fill="#fb7185"/>
        <text x="18" y="28" fill="#0f172a" font-size="8" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle">2</text>
        
        <!-- Actor name indicator -->
        <text x="38" y="16" fill="#fb7185" font-size="7.5" font-family="Inter, sans-serif" font-weight="900" style="text-transform: uppercase; letter-spacing: 0.5px;">Drive Service</text>
        
        <!-- Action Text -->
        <text x="38" y="34" fill="#ffffff" font-size="10.5" font-family="Inter, sans-serif" font-weight="700">Gọi API quét thư mục Google Drive</text>
      </g>
    
      <g transform="translate(140, 300)">
        <!-- Action Glow Shadow -->
        <rect width="320" height="50" rx="12" ry="12" fill="#1e293b" stroke="#10b981" stroke-width="2" style="filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));"/>
        
        <!-- Step Number badge -->
        <circle cx="18" cy="25" r="9" fill="#10b981" opacity="0.2"/>
        <circle cx="18" cy="25" r="7" fill="#10b981"/>
        <text x="18" y="28" fill="#0f172a" font-size="8" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle">3</text>
        
        <!-- Actor name indicator -->
        <text x="38" y="16" fill="#10b981" font-size="7.5" font-family="Inter, sans-serif" font-weight="900" style="text-transform: uppercase; letter-spacing: 0.5px;">Backend API</text>
        
        <!-- Action Text -->
        <text x="38" y="34" fill="#ffffff" font-size="10.5" font-family="Inter, sans-serif" font-weight="700">Nếu phát hiện file mới -&gt; Sync về DB</text>
      </g>
    
        <!-- End Node -->
        <circle cx="300" cy="395" r="14" fill="none" stroke="#f43f5e" stroke-width="2"/>
        <circle cx="300" cy="395" r="8" fill="#f43f5e"/>
        <text x="300" y="423" fill="#f43f5e" font-size="8" font-family="Inter, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">END</text>
      
      
      <!-- Footer Copyright Label -->
      <text x="300" y="435" fill="#475569" font-size="8" font-family="Inter, sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="1.5">UEF ETHESIS PORTAL DIAGRAM GENERATOR</text>
    </svg>
  